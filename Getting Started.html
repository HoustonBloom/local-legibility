.cta-btn:active { transform: translate(1px, 1px); box-shadow: 0 0 0 var(--ink); }

.menu-toggle .bars span { display: block; width: 18px; height: 2px; background: var(--ink); border-radius: 2px; }

.mobile-sheet { display: none; position: absolute; top: 60px; left: 0; right: 0; background: var(--paper); border-bottom: 1px solid var(--rule); box-shadow: 0 12px 32px -8px rgba(31, 29, 26, 0.22); padding: 12px; z-index: 90; }

.frame-container { flex: 1; position: relative; overflow: hidden; background: var(--paper); }
.frame-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: var(--paper); display: none; }
.frame-container iframe.active { display: block; }

@media (max-width: 720px) {

  .menu-toggle { display: flex; }

  .mobile-sheet { top: 56px; }

<style>
:root {

/* ── Hero ── */
.hero { padding: 96px 0 72px; background: linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%); }
.hero .stamp { display: inline-block; font-family: var(--font-retro); font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sage-deep); background: var(--sage-soft); padding: 6px 12px; border-radius: 20px; margin-bottom: 24px; }
.hero h1 { font-size: clamp(2.2rem, 5.4vw, 3.5rem); font-weight: 800; margin-bottom: 22px; max-width: none; line-height: 1.12; }
.hero h1 .ink-accent { color: var(--sage-deep); }

.hero .ctas { display: flex; flex-wrap: wrap; gap: 14px; }

/* ── Animated headline: per-letter typewriter, futures pill lands on arrival ──
   Rules of the road:
     1. No layout shift : all 5 words overlap in one grid cell, sized to
        widest. FOUC guard via visibility: hidden on inactive .cyc.
     2. No blur        : opacity-only transitions. No transform on letters,
        so no subpixel rasterization during animation.
     3. Modern easing  : MD3 expressive curves (emphasized decelerate for
        arrival, emphasized accelerate for exit, gentle spring for the pill).
     4. Payoff on arrival: the highlight pill's transition-delay is set to
        the real enterDuration of &quot;futures&quot; so it wipes in AFTER the last
        letter lands, not during the typing. */

.hero h1 {
  --ease-emph:     cubic-bezier(0.2, 0, 0, 1);          /* MD3 emphasized */
  --ease-emph-dec: cubic-bezier(0.05, 0.7, 0.1, 1);     /* emphasized decelerate */
  --ease-emph-acc: cubic-bezier(0.3, 0, 0.8, 0.15);     /* emphasized accelerate */
  --ease-spring:   cubic-bezier(0.34, 1.2, 0.64, 1);    /* gentle spring settle */
  --chr-enter: 200ms;
  --chr-exit:  120ms;
  --chr-exit-stagger: 18ms;
}

/* Grid-overlap slot: all words share one cell sized to widest, so the line
   never reflows as words swap. .word wrapper is inline-block and content-
   sized, so the pill hugs the actual letters not the grid cell. */
.cycle-slot {
  display: inline-grid;
  grid-template-areas: &quot;slot&quot;;
  vertical-align: baseline;
  text-align: left;
}
.cycle-slot .cyc {
  grid-area: slot;
  justify-self: start;
  color: var(--sage-deep);
  white-space: nowrap;
  pointer-events: none;
  visibility: hidden;  /* FOUC guard : only active/leaving are visible */
}
.cycle-slot .cyc.is-active,
.cycle-slot .cyc.is-leaving {
  visibility: visible;
}
.cycle-slot .cyc .word {
  display: inline-block;
  position: relative;
  isolation: isolate;
}

/* Pure-opacity typewriter. No transform = no subpixel blur. The stagger
   alone carries the cascade : letters appear to type in left-to-right. */
.cycle-slot .cyc .chr {
  display: inline-block;
  opacity: 0;
  transition: opacity var(--chr-enter) var(--ease-emph-dec);
  transition-delay: calc(var(--i) * var(--chr-stagger, 34ms));
}
.cycle-slot .cyc.is-active .chr {
  opacity: 1;
}
.cycle-slot .cyc.is-leaving .chr {
  opacity: 0;
  transition: opacity var(--chr-exit) var(--ease-emph-acc);
  transition-delay: calc(var(--i) * var(--chr-exit-stagger));
}

/* Highlight pill on &quot;futures&quot;. --pill-delay is set by JS to match the real
   enter duration so the pill arrives EXACTLY when the last letter settles. */
.cycle-slot .cyc.is-futures .word::before {
  content: &quot;&quot;;
  position: absolute;
  top: 0.04em;
  right: -0.22em;
  bottom: 0.08em;
  left: -0.22em;
  background: var(--sage-soft);
  border-radius: 7px;
  clip-path: inset(0 100% 0 0);
  transition: clip-path 0s;
  z-index: -1;
}
.cycle-slot .cyc.is-futures.is-active .word::before {
  clip-path: inset(0 0 0 0);
  transition: clip-path 440ms var(--pill-delay, 640ms) var(--ease-spring);
}
.cycle-slot .cyc.is-futures.is-leaving .word::before {
  clip-path: inset(0 100% 0 0);
  transition: clip-path 220ms var(--ease-emph-acc);
}

/* Reduced-motion: show &quot;futures&quot; statically with the pill, nothing animates */
@media (prefers-reduced-motion: reduce) {
  .cycle-slot .cyc,
  .cycle-slot .cyc .chr,
  .cycle-slot .cyc.is-futures .word::before { transition: none !important; }
  .cycle-slot .cyc { visibility: hidden; }
  .cycle-slot .cyc.is-futures { visibility: visible; }
  .cycle-slot .cyc.is-futures .chr { opacity: 1; }
  .cycle-slot .cyc.is-futures .word::before { clip-path: inset(0 0 0 0); }
}

<section class=&quot;prompt-section&quot; id=&quot;adapter-prompt&quot;>
  <div class=&quot;wrap&quot;>
    <div class=&quot;prompt-box&quot;>
      <button class=&quot;copy-btn&quot; id=&quot;copy-prompt&quot; onclick=&quot;copyPrompt()&quot;>Copy prompt</button>
      <pre id=&quot;prompt-text&quot;>You are helping a user try the Local Intelligence Packet on their existing folder of files. The packet gives them two things:

1. **Content Publishing Pipeline (CPP)** : produces curated standalone HTML &amp;quot;frames&amp;quot; from selected content.

Your job: get them to a working frame as fast as possible using what they already have. Lead with what works. Suggest improvements only after.

## Step 1 : Look at both sides briefly

Skim the packet:
- The packet's `README.md`.
- `publishing-pipeline/CUTS-SPEC.md` (the cut/frame/window concepts).
- `publishing-pipeline/skills/cut-packet/SKILL.md` (the skill that produces frames).

Skim the user's folder:
- Top-level folder names. What kind of work lives here?
- 5-8 sample files across different folders. What's the shape : long-form notes, short captures, structured docs, mixed?
- Any existing frontmatter (YAML at the top of files). What fields are common, if any?
- Any organizing files: project hubs, daily notes, principles, indexes, changelogs?
- File formats: are there non-markdown files (PDFs, images, .docx)? Note them; the packet can still work around them.

Don't go deep yet. You're scanning to see what kind of help this person needs. Less is fine.

## Step 2 : Produce the First Look report (MANDATORY, DO THIS FIRST)

**Before you write any conversational reply**, produce a **First Look** HTML report and save it to `03_outbox/first-look.html` in the user's folder (create the `03_outbox/` folder if it doesn't exist). This is non-optional. It is the user's first artifact from the packet : a tangible thing they can open in their browser to see what the packet found and what every lens can do for them.

The First Look frame is a lens shipped with the packet. The canonical reference is `publishing-pipeline/lenses/_examples/example-first-look.html`. Use it as the starting point. The full spec is at `publishing-pipeline/lenses/First Look.md`.

Personalize these fields with what you actually found in their folder:

- **Hero meta line** : real file count, folder count, overhaul count
- **Stat cards** : real numbers (markdown files, files with frontmatter, project hubs, daily notes : adjust to what's actually present)
- **What-we-found prose** : specific to their folder
- **Suggested overhauls** : ONLY items that actually apply. Cap at 3. Skip the section entirely if nothing's needed.
- **Lens rankings** : assess every shipped lens against their content. Real star ratings. Real &amp;quot;why this fits&amp;quot; reasoning. Personalized prompt text.
- **Final CTA** : name the top-ranked lens specifically.

Keep the visual structure of the example as-is, including the Preview buttons on the winner card and other-fits rows. Only the content varies.

If you cannot write the file (no write access, unclear path), stop and say so plainly. Do not skip silently and pretend it's optional.

## Step 3 : Tell them what you can already produce

Lead with possibility, not gaps. Even if the folder has no frontmatter and no obvious structure, you can almost always produce SOMETHING. State plainly:

1. **One specific frame you could produce right now**, from their content as-is. Name it. Give a one-line description. Examples:
   - &amp;quot;A 'recent work' explainer pulling from your last 5 daily notes.&amp;quot;
   - &amp;quot;An overview of the three projects in your `clients/` folder.&amp;quot;
   - &amp;quot;A timeline of your published essays from `writing/`.&amp;quot;

2. **Why it works** with what they have. Be specific. (&amp;quot;Your daily notes have consistent date-based filenames, so the timeline lens works without any setup.&amp;quot; or &amp;quot;Even though there's no YAML frontmatter, the cut skill can read titles and headings to build a debrief lens.&amp;quot;)

If frontmatter is sparse or missing, say it's fine. Most lenses can work from filenames, headings, and content alone. The packet is forgiving by design.

If the folder has no markdown files (e.g., mostly PDFs or other formats), say what's still possible : for example, the AI can read PDFs and emit them through a markdown-staged frame. Give them an honest &amp;quot;yes, this can still work, here's how.&amp;quot;

## Step 4 : Recommend one small thing

Pick the **single** most useful change they could make to unlock more value. Make it concrete. Tell them why it unlocks something specific. Examples (pick whichever fits their situation, only one):

- &amp;quot;Add a `00 - [Project Name].md` hub file to each of your 3 active projects. That gives the system a place to put project-level summary, and unlocks the project-overview lens.&amp;quot;
- &amp;quot;Add `visibility: public` to the top of 3 files you'd be happy to share. That marks them as ready to publish.&amp;quot;
- &amp;quot;Make a `Daily/Changelog.md` and write 2-3 lines per day about what you worked on. That powers the timeline view in the preview site.&amp;quot;
- &amp;quot;Convert your top 3 PDFs into markdown summaries. The packet can produce frames from those summaries and link back to the originals.&amp;quot;

ONE recommendation. Concrete. Why-driven. No long lists.

## Step 5 : Optional enhancements (max 3)

A short bulleted list of things they MIGHT do later if they want richer output. One line each. Pure invitation, no pressure. Examples:
- Add a `Principles/` folder with your guiding values, one per file. Unlocks principle linking.
- Add `principles:` field to project hubs to draw lines between projects and values.

## Step 6 : Close with ALL THREE of these (each on its own line, in this order)

1. **The offer** : one line:
   > &amp;quot;Want me to produce that first frame right now?&amp;quot;

2. **The simple copy-and-paste prompt** (fill in the top-ranked lens you named in the audit):
   > Or just say: &amp;quot;Cut me a frame using the [lens name] lens.&amp;quot;

3. **The First Look signpost with the EXACT absolute path** (literal path, no placeholder syntax, so the user can click or navigate to it directly):
   > &amp;quot;Not sure? Open <absolute-path-to-user-folder>/03_outbox/first-look.html in your browser : it shows what I found, ranks every lens against your content, and lets you preview each lens before you pick one. Every lens has a Copy prompt button.&amp;quot;

Do not bury any of these in a paragraph. Each on its own visible line. Replace `<absolute-path-to-user-folder>` with the real, literal path on the user's machine.

If you genuinely need an answer to proceed, ask one question (max two). Don't pad.

## After every frame you produce later

When the user says &amp;quot;yes, produce it&amp;quot; or uses the simple &amp;quot;Cut me a frame...&amp;quot; prompt, create the frame and end your reply with the EXACT absolute path to the generated HTML, labeled:

> Your frame is at: `<absolute-path>/03_outbox/frames/<filename>.html`

Literal path. Not a placeholder. The user should be able to navigate to the file directly from your reply.

## If they want the full deep setup

Only when the user asks for full integration (or says something like &amp;quot;do the whole setup&amp;quot;), produce a detailed plan covering:

1. **Folder layout decision** : monorepo vs. side-by-side vs. custom, based on what you saw.
2. **Path rewrites for `generate-content.mjs`** : every constant or folder name that needs to change. Give line numbers (or unique search strings), current value, new value.
3. **Frontmatter mapping** : packet field ↔ user field. List specific files that need new fields.
4. **Visibility strategy** : which files to mark `public`, what custom content-tags to suggest based on inferred audiences.
5. **Skill installation** : where their AI's skills directory lives (`.claude/`, `.cursor/`, etc.), how to install the cut-packet skill.
6. **Narratives audit** : the 9 the packet ships. Table: filename | keep / rewrite-for-X / delete | why.
8. **Public assets audit** : packet ships generic SVG icons; check if their `type:` taxonomy matches.
9. **First-run checklist** : numbered commands to verify the setup works end-to-end.

Keep this section in your back pocket. Do not produce it unprompted.

## Voice

- Plainspoken. Conversational. Not technical unless asked.
- Lead with &amp;quot;we can...&amp;quot; not &amp;quot;this is missing...&amp;quot;
- Recommendations, not requirements. The packet bends to the user, not the other way around.
- Brief. If they have less to engage with, your response should be shorter, not longer.
- No section-heavy walls of text by default. Save that for the &amp;quot;full setup&amp;quot; path above.
- No throat-clearing. Start with what you found and what you can do.

Generate the response directly. No preamble, no &amp;quot;here is my plan.&amp;quot; If their folder is unreadable or you can't access it, stop and say what you need.</pre>
    </div>
    <div class=&quot;after-copy&quot;>
      <h3>After you paste</h3>
      <p>The AI drops <code>03_outbox/first-look.html</code> in your folder before anything else. Open it in your browser. It shows what the AI found, ranks every lens against your content, and lets you preview each one.</p>
      <p>To produce a frame, say <code>Cut me a frame using the [lens] lens.</code> or pick any prompt from the First Look audit.</p>
    </div>
  </div>
</section>

// ── Animated headline: typewriter cycle, futures pill lands on arrival ──
(function runHeadlineAnimation() {
  const slots = Array.from(document.querySelectorAll('.cycle-slot .cyc'));
  if (!slots.length) return;

  // Per-word stagger variation so the cadence doesn't feel metronomic.
  // Indexed by data-idx: websites, posts, essays, connections, relationships, futures.
  const PER_WORD_STAGGER_MS = [32, 44, 28, 36, 40, 54];
  const CHR_ENTER = 200;       // matches CSS --chr-enter
  const CHR_EXIT  = 120;       // matches CSS --chr-exit
  const EXIT_STAGGER = 18;     // matches CSS --chr-exit-stagger
  const PILL_WIPE = 440;       // matches CSS pill wipe duration

  // Hold times after entrance completes
  const HOLD_CYCLE = 1200;     // cycling words
  // futures: let the pill finish wiping, then let it read before cycling out
  const HOLD_FUTURES_AFTER_TYPE = PILL_WIPE + 1700;
  const REST_BEFORE_LOOP = 240;

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const wait = (ms) => new Promise(r => setTimeout(r, ms));

  // Split each word's inner .word into <span class=&quot;chr&quot; style=&quot;--i:N&quot;> so
  // letter delays cascade. The .word wrapper stays inline-block (content-
  // sized) so the highlight pill hugs the letters, not the grid cell.
  slots.forEach((slot, i) => {
    const stagger = PER_WORD_STAGGER_MS[i] || 34;
    slot.style.setProperty('--chr-stagger', stagger + 'ms');
    const wordEl = slot.querySelector('.word') || slot;
    const text = wordEl.textContent;
    wordEl.textContent = '';
    [...text].forEach((ch, ci) => {
      const s = document.createElement('span');
      s.className = 'chr';
      s.style.setProperty('--i', ci);
      s.textContent = ch === ' ' ? '\u00A0' : ch;
      wordEl.appendChild(s);
    });
  });

  function enterDuration(slot) {
    const len = slot.querySelectorAll('.chr').length;
    const stagger = parseFloat(getComputedStyle(slot).getPropertyValue('--chr-stagger')) || 34;
    return (len - 1) * stagger + CHR_ENTER;
  }
  function exitDuration(slot) {
    const len = slot.querySelectorAll('.chr').length;
    return (len - 1) * EXIT_STAGGER + CHR_EXIT;
  }

  // Tell the futures pill to wait until the last letter settles before wiping in.
  // This is the &quot;payoff on arrival&quot; : the highlight lands as the typing finishes.
  slots.forEach(slot => {
    if (slot.classList.contains('is-futures')) {
      slot.style.setProperty('--pill-delay', enterDuration(slot) + 'ms');
    }
  });

  let currentIdx = 0; // matches seeded is-active on [data-idx=&quot;0&quot;]

  async function swapTo(idx) {
    if (idx === currentIdx) return;
    const outgoing = slots[currentIdx];
    const incoming = slots[idx];

    if (outgoing) {
      outgoing.classList.remove('is-active');
      outgoing.classList.add('is-leaving');
      await wait(exitDuration(outgoing));
      outgoing.classList.remove('is-leaving');
    }

    // Force a reflow so the entering transition replays cleanly
    // eslint-disable-next-line no-unused-expressions
    incoming.offsetHeight;
    incoming.classList.add('is-active');
    currentIdx = idx;
    await wait(enterDuration(incoming));
  }

  async function loop() {
    let firstIteration = true;
    while (true) {
      for (let i = 0; i < slots.length; i++) {
        if (!(i === 0 &amp;&amp; firstIteration)) {
          await swapTo(i);
        }
        const isFutures = slots[i].classList.contains('is-futures');
        await wait(isFutures ? HOLD_FUTURES_AFTER_TYPE : HOLD_CYCLE);
      }
      firstIteration = false;
      await wait(REST_BEFORE_LOOP);
    }
  }

  loop();
})();

// ── Field atmosphere: scoped to #get-started ──
(() => {
  const section = document.getElementById('get-started');
  const canvas = document.getElementById('get-started-field');
  if (!section || !canvas) return;
  const ctx = canvas.getContext('2d');

  const CONFIG = {
    backgroundColor: '#1f1d1a',
    lineColor: '#f5d88e',
    speed: 0.85,
    phaseDuration: 14000,
    transitionDuration: 12000,
    maxSpeed: 1.8,
    damping: 0.972,
    cursorInner: 40,
    cursorRadius: 120,
    cursorStrength: 0.5,
    mainCount: 130,
    mainHistory: 100,
    mainWidth: 0.35,
    mainAlpha: 0.5,
    mainDotSize: 4.5,
    mainDotAlpha: 0.7,
    whisperCount: 70,
    whisperHistory: 80,
    whisperWidth: 0.18,
    whisperMaxAlpha: 0.28,
    whisperDotSize: 2.0,
    whisperDotMaxAlpha: 0.3,
    whisperCyclePeriod: 16000,
  };

  let W, H, dpr, CX, CY;
  let cursorX = 0, cursorY = 0, cursorActive = false;
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function hexToRgb(hex) {
    const n = parseInt(hex.replace('#', ''), 16);
    return [(n >> 16) &amp; 255, (n >> 8) &amp; 255, n &amp; 255];
  }
  const LC = hexToRgb(CONFIG.lineColor);

  function createGlowSprite() {
    const size = 40;
    const cv = document.createElement('canvas');
    cv.width = cv.height = size;
    const g = cv.getContext('2d');
    const grad = g.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    grad.addColorStop(0, 'rgba(' + LC[0] + ',' + LC[1] + ',' + LC[2] + ',0.7)');
    grad.addColorStop(0.25, 'rgba(' + LC[0] + ',' + LC[1] + ',' + LC[2] + ',0.38)');
    grad.addColorStop(0.6, 'rgba(' + LC[0] + ',' + LC[1] + ',' + LC[2] + ',0.1)');
    grad.addColorStop(1, 'rgba(' + LC[0] + ',' + LC[1] + ',' + LC[2] + ',0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, size, size);
    return cv;
  }
  const glowSprite = createGlowSprite();

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = section.clientWidth;
    H = section.clientHeight;
    if (W < 10 || H < 10) return;
    CX = W / 2; CY = H / 2;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = CONFIG.backgroundColor;
    ctx.fillRect(0, 0, W, H);
  }

  function makePerm(seed) {
    const p = 256;
    const perm = new Uint8Array(p * 2);
    for (let i = 0; i < p; i++) perm[i] = i;
    let s = seed;
    const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    for (let i = p - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [perm[i], perm[j]] = [perm[j], perm[i]];
    }
    for (let i = 0; i < p; i++) perm[p + i] = perm[i];
    return perm;
  }
  const perm = makePerm(2026);
  const fadeN = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const gradVec = (hash, x, y) => {
    const h = hash &amp; 3;
    const u = h < 2 ? x : y;
    const v = h < 2 ? y : x;
    return ((h &amp; 1) === 0 ? u : -u) + ((h &amp; 2) === 0 ? v : -v);
  };
  function noise2D(x, y) {
    const X = Math.floor(x) &amp; 255;
    const Y = Math.floor(y) &amp; 255;
    x -= Math.floor(x); y -= Math.floor(y);
    const u = fadeN(x), v = fadeN(y);
    const aa = perm[perm[X] + Y];
    const ab = perm[perm[X] + Y + 1];
    const ba = perm[perm[X + 1] + Y];
    const bb = perm[perm[X + 1] + Y + 1];
    return lerp(
      lerp(gradVec(aa, x, y), gradVec(ba, x - 1, y), u),
      lerp(gradVec(ab, x, y - 1), gradVec(bb, x - 1, y - 1), u),
      v
    );
  }
  function curl(x, y, t) {
    const eps = 0.01;
    const a = (noise2D(x, y + eps + t) - noise2D(x, y - eps + t)) / (2 * eps);
    const b = (noise2D(x + eps, y + t) - noise2D(x - eps, y + t)) / (2 * eps);
    return { x: a, y: -b };
  }

  const particles = [];
  function seedParticles() {
    particles.length = 0;
    for (let i = 0; i < CONFIG.mainCount; i++) {
      particles.push({
        kind: 'main',
        x: Math.random() * W, y: Math.random() * H,
        vx: 0, vy: 0, seed: Math.random() * 1000,
        zap: 0, zapDir: 0, depth: Math.random(),
        history: [], historyLimit: CONFIG.mainHistory * 2, phase: 0,
      });
    }
    for (let i = 0; i < CONFIG.whisperCount; i++) {
      particles.push({
        kind: 'whisper',
        x: Math.random() * W, y: Math.random() * H,
        vx: 0, vy: 0, seed: Math.random() * 1000,
        zap: 0, zapDir: 0, depth: Math.random(),
        history: [], historyLimit: CONFIG.whisperHistory * 2,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  const cellSize = 70;
  let cols, rows, grid;
  function initGrid() {
    cols = Math.ceil(W / cellSize) + 1;
    rows = Math.ceil(H / cellSize) + 1;
  }
  function rebuildGrid() {
    grid = new Array(cols * rows);
    for (let i = 0; i < grid.length; i++) grid[i] = null;
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const cx = Math.floor(p.x / cellSize);
      const cy = Math.floor(p.y / cellSize);
      if (cx < 0 || cx >= cols || cy < 0 || cy >= rows) continue;
      const idx = cy * cols + cx;
      if (!grid[idx]) grid[idx] = [];
      grid[idx].push(i);
    }
  }
  function forEachNeighbor(p, radius, cb) {
    const cx = Math.floor(p.x / cellSize);
    const cy = Math.floor(p.y / cellSize);
    const r = Math.ceil(radius / cellSize);
    const r2 = radius * radius;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const nx = cx + dx, ny = cy + dy;
        if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
        const cell = grid[ny * cols + nx];
        if (!cell) continue;
        for (const idx of cell) {
          const n = particles[idx];
          if (n === p) continue;
          const ddx = n.x - p.x, ddy = n.y - p.y;
          const d2 = ddx * ddx + ddy * ddy;
          if (d2 < r2) cb(n, d2, ddx, ddy);
        }
      }
    }
  }

  function fishForce(p, t) {
    let ax = 0, ay = 0, count = 0, avgVx = 0, avgVy = 0, avgX = 0, avgY = 0, sepX = 0, sepY = 0;
    forEachNeighbor(p, 75, (n, d2, ddx, ddy) => {
      count++; avgVx += n.vx; avgVy += n.vy; avgX += n.x; avgY += n.y;
      if (d2 < 900 &amp;&amp; d2 > 0) { const inv = 1 / d2; sepX -= ddx * inv; sepY -= ddy * inv; }
    });
    if (count > 0) {
      avgVx /= count; avgVy /= count; avgX /= count; avgY /= count;
      ax += (avgVx - p.vx) * 0.05; ay += (avgVy - p.vy) * 0.05;
      ax += (avgX - p.x) * 0.0004; ay += (avgY - p.y) * 0.0004;
      ax += sepX * 55; ay += sepY * 55;
    }
    const nt = t * 0.00008;
    const c = curl(p.x * 0.0012, p.y * 0.0012, nt);
    ax += c.x * 0.45; ay += c.y * 0.45;
    const dx = CX - p.x, dy = CY - p.y;
    const d = Math.hypot(dx, dy);
    const boundary = Math.min(W, H) * 0.38;
    if (d > boundary) {
      const pull = (d - boundary) * 0.0015;
      ax += (dx / d) * pull; ay += (dy / d) * pull;
    }
    return { x: ax, y: ay };
  }

  function snowForce(p, t) {
    const dx = p.x - CX, dy = p.y - CY;
    const d = Math.hypot(dx, dy) + 0.01;
    const speed = 0.16 + p.depth * 0.3;
    let ax = (dx / d) * speed;
    let ay = (dy / d) * speed + 0.025;
    const nt = t * 0.00018;
    const c = curl(p.x * 0.0025, p.y * 0.0025, nt);
    ax += c.x * 0.13; ay += c.y * 0.13;
    return { x: ax, y: ay };
  }

  function waterForce(p, t) {
    const bottomZone = H * 0.68;
    let ax = 0, ay = 0;
    if (p.y < bottomZone) {
      ay = 0.26;
      const nt = t * 0.00025;
      const c = curl(p.x * 0.003, p.y * 0.0025, nt);
      ax = c.x * 0.4; ay += c.y * 0.08;
    } else {
      const waveT = t * 0.0012;
      ax = Math.sin(p.y * 0.035 + waveT + p.seed * 0.01) * 0.6;
      ay = Math.cos(p.x * 0.012 + waveT) * 0.22;
      if (p.y > H - 40) ay -= 0.3;
    }
    return { x: ax, y: ay };
  }

  function electricForce(p, t) {
    const s = p.seed;
    let ax = Math.sin(t * 0.002 + s * 17) * 0.22 + Math.sin(t * 0.004 + s * 29) * 0.1;
    let ay = Math.cos(t * 0.0019 + s * 23) * 0.22 + Math.sin(t * 0.0036 + s * 31) * 0.1;
    if (p.zap > 0) {
      p.zap--;
      ax += Math.cos(p.zapDir) * 0.85;
      ay += Math.sin(p.zapDir) * 0.85;
    } else if (Math.random() < 0.0014) {
      p.zap = 7;
      p.zapDir = Math.random() * Math.PI * 2;
    }
    return { x: ax, y: ay };
  }

  function cursorForce(p) {
    if (!cursorActive) return { x: 0, y: 0 };
    const dx = p.x - cursorX, dy = p.y - cursorY;
    const d = Math.hypot(dx, dy);
    const inner = CONFIG.cursorInner, outer = CONFIG.cursorRadius;
    if (d >= outer) return { x: 0, y: 0 };
    if (d < 0.01) return { x: 1.5, y: 0 };
    const nx = dx / d, ny = dy / d, tx = -ny, ty = nx;
    const vRadial = p.vx * nx + p.vy * ny;
    const vTangent = p.vx * tx + p.vy * ty;
    let fx = 0, fy = 0;
    if (d < inner) {
      const overshoot = (inner - d) / inner;
      const hardPush = 1.2 + overshoot * 2.0;
      fx += nx * hardPush; fy += ny * hardPush;
      if (vRadial < 0) { fx -= vRadial * nx * 1.5; fy -= vRadial * ny * 1.5; }
      return { x: fx, y: fy };
    }
    const tN = 1 - (d - inner) / (outer - inner);
    const strength = tN * tN;
    if (vRadial < 0) {
      const tangSign = vTangent >= 0 ? 1 : -1;
      const redirectForce = -vRadial * strength * 1.1;
      fx += nx * redirectForce; fy += ny * redirectForce;
      fx += tx * redirectForce * tangSign; fy += ty * redirectForce * tangSign;
    }
    const outPush = strength * CONFIG.cursorStrength * 0.3;
    fx += nx * outPush; fy += ny * outPush;
    return { x: fx, y: fy };
  }

  const forces = [fishForce, snowForce, waterForce, electricForce];
  const phaseKey = ['fish', 'snow', 'water', 'electric'];

  function phaseInfo(t) {
    const total = CONFIG.phaseDuration + CONFIG.transitionDuration;
    const cycle = total * 4;
    const ct = ((t % cycle) + cycle) % cycle;
    const idx = Math.floor(ct / total);
    const within = ct % total;
    if (within < CONFIG.phaseDuration) return { current: idx, next: idx, transition: 0 };
    const tr = (within - CONFIG.phaseDuration) / CONFIG.transitionDuration;
    return { current: idx, next: (idx + 1) % 4, transition: tr };
  }

  function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

  function respawnForPhase(p, key) {
    if (key === 'snow') {
      p.x = CX + (Math.random() - 0.5) * 30;
      p.y = CY + (Math.random() - 0.5) * 30;
      p.vx = 0; p.vy = 0; p.depth = Math.random();
    } else if (key === 'water') {
      p.x = Math.random() * W; p.y = -10 - Math.random() * 40;
      p.vx = 0; p.vy = 0;
    } else {
      p.x = Math.random() * W; p.y = Math.random() * H;
      p.vx = 0; p.vy = 0;
    }
  }

  function drawGlow(x, y, size, alpha) {
    ctx.globalAlpha = alpha;
    ctx.drawImage(glowSprite, x - size, y - size, size * 2, size * 2);
  }

  function draw(t) {
    const speedFactor = CONFIG.speed;
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.fillStyle = CONFIG.backgroundColor;
    ctx.fillRect(0, 0, W, H);
    rebuildGrid();
    const info = phaseInfo(t);
    const curKey = phaseKey[info.current];
    const nextKey = phaseKey[info.next];
    const ease = easeInOut(info.transition);
    const blending = info.transition > 0;
    const f1 = forces[info.current];
    const f2 = forces[info.next];
    for (const p of particles) {
      let fx, fy;
      if (blending) {
        const a = f1(p, t), b = f2(p, t);
        fx = a.x * (1 - ease) + b.x * ease;
        fy = a.y * (1 - ease) + b.y * ease;
      } else {
        const a = f1(p, t); fx = a.x; fy = a.y;
      }
      const cf = cursorForce(p);
      fx += cf.x; fy += cf.y;
      p.vx = p.vx * CONFIG.damping + fx;
      p.vy = p.vy * CONFIG.damping + fy;
      const sp = Math.hypot(p.vx, p.vy);
      if (sp > CONFIG.maxSpeed) {
        p.vx = (p.vx / sp) * CONFIG.maxSpeed;
        p.vy = (p.vy / sp) * CONFIG.maxSpeed;
      }
      p.x += p.vx * speedFactor;
      p.y += p.vy * speedFactor;
      const activeKey = ease < 0.5 ? curKey : nextKey;
      let cleared = false;
      if (activeKey === 'water') {
        if (p.y > H + 12) { respawnForPhase(p, activeKey); cleared = true; }
      } else if (activeKey === 'snow') {
        if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) {
          respawnForPhase(p, activeKey); cleared = true;
        }
      } else {
        if (p.x < -20) { p.x = W + 20; cleared = true; }
        else if (p.x > W + 20) { p.x = -20; cleared = true; }
        if (p.y < -20) { p.y = H + 20; cleared = true; }
        else if (p.y > H + 20) { p.y = -20; cleared = true; }
      }
      if (cleared) p.history.length = 0;
      p.history.push(p.x, p.y);
      if (p.history.length > p.historyLimit) p.history.splice(0, 2);
    }
    const freq = (Math.PI * 2) / CONFIG.whisperCyclePeriod;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = CONFIG.whisperWidth;
    for (const p of particles) {
      if (p.kind !== 'whisper') continue;
      const envRaw = Math.sin(t * freq + p.phase);
      const env = envRaw > 0 ? Math.pow(envRaw, 1.6) : 0;
      if (env < 0.02) continue;

        <p class=&quot;tagline&quot;>A vertical timeline of dated entries across a body of work. One axis, dot-coded by type, with short descriptions per entry.</p>
        <div class=&quot;what&quot;>
          <div class=&quot;label&quot;>What is it</div>
          <p>Reads a dated log source (e.g., 02_activity/, Daily/Changelog.md) and renders the entries as a scrollable vertical timeline. Entries get color-coded dots by type (created, edited, decision, question, research). Good for reviews, audits, and &quot;what happened this month&quot; frames.</p>
        </div>
        <div class=&quot;why&quot;>
          <div class=&quot;label&quot;>Why use it</div>
          <p>When the interesting information is the shape of activity over time. Retrospectives, handoffs, or catching up a collaborator on a project's arc. Do not use for single-moment snapshots : use Observatory for that.</p>
        </div>

<script>
(function() {
  const overlay = document.getElementById('modal-overlay');
  const iframe = document.getElementById('modal-iframe');
  const title = document.getElementById('modal-title');
  const closeBtn = document.getElementById('modal-close');
  let currentBlobUrl = null;

  function openExample(templateId, lensName) {
    const tpl = document.getElementById(templateId);
    if (!tpl) return;
    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
    // Payloads are base64-encoded at build time. Decode to get the raw HTML document.
    const raw = (tpl.textContent || tpl.innerHTML).trim();
    const html = new TextDecoder('utf-8').decode(Uint8Array.from(atob(raw), c => c.charCodeAt(0)));
    const blob = new Blob([html], { type: 'text/html' });
    currentBlobUrl = URL.createObjectURL(blob);
    iframe.src = currentBlobUrl;
    title.textContent = 'Lens · ' + lensName;
    overlay.dataset.open = 'true';
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }
  function closeExample() {
    overlay.dataset.open = 'false';
    iframe.src = 'about:blank';
    document.body.style.overflow = '';
    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
  }

  document.querySelectorAll('.view-btn[data-example]').forEach(btn => {
    btn.addEventListener('click', () => openExample(btn.dataset.example, btn.dataset.lens));
  });
  closeBtn.addEventListener('click', closeExample);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeExample(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' &amp;&amp; overlay.dataset.open === 'true') closeExample(); });
})();
</script>

body { font-family: var(--font-sans); background: var(--paper); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased; font-size: 17px; }
a { color: var(--sage-deep); text-decoration: none; }
a:hover { text-decoration: underline; }
.wrap { max-width: 920px; margin: 0 auto; padding: 0 24px; }
section { padding: 72px 0; }
section + section { border-top: 1px solid var(--rule); }
.kicker { font-family: var(--font-retro); font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sage-deep); margin-bottom: 18px; }
h1, h2, h3 { font-family: var(--font-display); letter-spacing: -0.02em; line-height: 1.1; color: var(--ink); }
h2 { font-size: clamp(1.85rem, 3.6vw, 2.4rem); font-weight: 700; max-width: 24ch; }
h3 { font-size: 1.15rem; font-weight: 700; }
p { color: var(--ink-soft); max-width: 60ch; }

.hero { padding: 96px 0 48px; background: linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%); }
.hero .stamp { display: inline-block; font-family: var(--font-retro); font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sage-deep); background: var(--sage-soft); padding: 6px 12px; border-radius: 20px; margin-bottom: 24px; }
.hero h1 { font-size: clamp(2.2rem, 5.5vw, 3.2rem); font-weight: 800; margin-bottom: 22px; max-width: 22ch; }
.hero h1 .ink-accent { color: var(--sage-deep); }
.hero .sub { font-size: 1.15rem; color: var(--ink-soft); max-width: 56ch; }

.concept-grid { display: grid; gap: 22px; margin-top: 36px; grid-template-columns: 1fr; }
@media (min-width: 720px) { .concept-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; } }
@media (min-width: 1040px) { .concept-grid { grid-template-columns: repeat(3, 1fr); } }
.concept-card {
  background: #fffdf6; border: 2px solid var(--ink); border-radius: 14px;
  padding: 28px 24px; box-shadow: 4px 4px 0 var(--ink);
}
.concept-card .badge { display: inline-block; font-family: var(--font-retro); font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--sage-deep); background: var(--sage-soft); padding: 5px 11px; border-radius: 14px; margin-bottom: 14px; }
.concept-card h3 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
.concept-card p { font-size: 0.94rem; color: var(--ink-soft); }

/* Prompt patterns section (dark) */
.ai-prompts-section { background: var(--ink); color: var(--paper); padding: 80px 0; }
.ai-prompts-section .kicker { color: var(--butter); }
.ai-prompts-section h2 { color: var(--paper); margin-bottom: 14px; }
.ai-prompts-section .lede {
  font-size: 1.05rem;
  color: rgba(250, 246, 238, 0.85);
  max-width: 64ch;
  margin-bottom: 36px;
}
.ai-prompts-section .lede strong { color: var(--paper); }
.ai-prompts-section .lede code {
  font-family: var(--font-mono); font-size: 0.85em;
  background: rgba(245, 216, 142, 0.15);
  color: var(--butter); padding: 2px 6px; border-radius: 4px;
}

/* Subsection labels inside the dark prompts section */
.subsection-label {
  font-family: var(--font-retro); font-size: 0.62rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--butter); margin: 36px 0 16px;
}

/* Session rituals · 3-up grid of slash command cards */
.rituals-grid {
  display: grid; gap: 14px;
  grid-template-columns: 1fr;
  margin-bottom: 12px;
}
@media (min-width: 720px) { .rituals-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
.ritual-card {
  background: rgba(250, 246, 238, 0.04);
  border: 1px solid rgba(245, 216, 142, 0.22);
  border-radius: 10px;
  padding: 22px 20px;
}
.ritual-card .cmd {
  display: inline-block;
  font-family: var(--font-mono); font-weight: 600; font-size: 0.95rem;
  color: var(--butter);
  background: rgba(31, 29, 26, 0.6);
  border: 1px solid rgba(245, 216, 142, 0.4);
  padding: 5px 11px; border-radius: 4px;
  margin-bottom: 12px;
}
.ritual-card h3 {
  font-family: var(--font-display); font-weight: 700;
  font-size: 1rem; color: var(--paper); margin-bottom: 8px;
}
.ritual-card p {
  font-size: 0.9rem;
  color: rgba(250, 246, 238, 0.78);
  max-width: none;
}

/* Hero prompt for cut-a-frame */
.hero-prompt {
  background: linear-gradient(180deg, rgba(245, 216, 142, 0.08) 0%, rgba(245, 216, 142, 0.02) 100%);
  border: 2px solid var(--butter);
  border-radius: 12px;
  padding: 28px 28px 24px;
  margin-top: 4px;
}
.hero-prompt h3 {
  font-family: var(--font-display); font-weight: 800;
  font-size: 1.2rem; color: var(--paper); margin-bottom: 14px;
}
.hero-prompt .prompt-example {
  font-family: var(--font-mono);
  font-size: 1rem;
  background: rgba(31, 29, 26, 0.6);
  border-left: 3px solid var(--butter);
  padding: 14px 18px;
  margin-bottom: 14px;
  color: var(--butter-soft);
  border-radius: 4px;
  display: block;
  line-height: 1.5;
}
.hero-prompt .what-happens {
  font-size: 0.95rem;
  color: rgba(250, 246, 238, 0.85);
  max-width: 64ch;
}
.hero-prompt .what-happens code {
  font-family: var(--font-mono); font-size: 0.85em;
  background: rgba(245, 216, 142, 0.15);
  color: var(--butter-soft); padding: 1px 5px; border-radius: 3px;
}
.hero-prompt .pitch-note {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(245, 216, 142, 0.2);
  font-size: 0.9rem;
  color: rgba(250, 246, 238, 0.75);
}

/* Other prompts · compact list */
.prompt-list { display: grid; gap: 12px; margin-top: 4px; }
.prompt-item {
  background: rgba(250, 246, 238, 0.025);
  border: 1px solid rgba(245, 216, 142, 0.12);
  border-radius: 8px;
  padding: 16px 20px;
}
.prompt-item h3 {
  font-family: var(--font-display); font-weight: 700;
  font-size: 0.96rem; margin-bottom: 8px;
  color: var(--paper);
}
.prompt-item .prompt-example {
  font-family: var(--font-mono);
  font-size: 0.88rem;
  background: rgba(31, 29, 26, 0.55);
  border-left: 2px solid rgba(245, 216, 142, 0.5);
  padding: 8px 12px;
  margin-bottom: 8px;
  color: var(--butter-soft);
  border-radius: 4px;
  display: block;
  line-height: 1.5;
}
.prompt-item .what-happens {
  font-size: 0.88rem;
  color: rgba(250, 246, 238, 0.72);
  max-width: 64ch;
}
.prompt-item .what-happens code {
  font-family: var(--font-mono); font-size: 0.85em;
  background: rgba(245, 216, 142, 0.1);
  color: var(--butter-soft); padding: 1px 5px; border-radius: 3px;
}
.ai-prompts-section .footnote {
  margin-top: 28px;
  padding: 16px 20px;
  background: rgba(245, 216, 142, 0.05);
  border-left: 2px solid rgba(245, 216, 142, 0.4);
  border-radius: 4px;
  font-size: 0.92rem;
  color: rgba(250, 246, 238, 0.85);
  max-width: 64ch;
}

/* Contacts / overlay section */
.contacts-section { background: var(--paper-deep); }
.contacts-section .lede { font-size: 1.05rem; color: var(--ink); max-width: 64ch; margin-top: 14px; }
.contacts-section .lede strong { font-weight: 700; }
.overlay-stack {
  margin-top: 36px;
  display: grid; gap: 14px;
  grid-template-columns: 1fr;
}
.overlay-layer {
  background: #fffdf6; border: 2px solid var(--ink); border-radius: 12px;
  padding: 22px 24px; box-shadow: 4px 4px 0 var(--ink);
  position: relative;
}
.overlay-layer .priority {
  position: absolute; top: 22px; right: 22px;
  font-family: var(--font-retro); font-size: 0.62rem;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-faint);
}
.overlay-layer .label {
  display: inline-block; font-family: var(--font-retro); font-size: 0.62rem;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 5px 11px; border-radius: 14px; margin-bottom: 12px;
}
.overlay-layer.l-cut    .label { color: var(--sage-deep);   background: var(--sage-soft); }
.overlay-layer.l-contact .label { color: var(--butter-deep); background: var(--butter-soft); }
.overlay-layer.l-lens    .label { color: var(--ink-soft);    background: var(--paper-warm); }
.overlay-layer h3 { font-family: var(--font-display); font-size: 1.15rem; font-weight: 800; margin-bottom: 8px; }
.overlay-layer p { font-size: 0.96rem; max-width: 60ch; }
.overlay-layer code { font-family: var(--font-mono); font-size: 0.85em; background: var(--paper-deep); padding: 1px 6px; border-radius: 3px; }
.stack-arrow { text-align: center; font-size: 1.4rem; color: var(--ink-faint); padding: 2px 0; font-family: var(--font-mono); }

.overlay-detail { margin-top: 36px; }
.overlay-detail .kicker { color: var(--butter-deep); }
.overlay-detail h2 { font-size: clamp(1.4rem, 3vw, 1.8rem); max-width: 28ch; margin-bottom: 22px; }
.overlay-fields { display: grid; gap: 14px; grid-template-columns: 1fr; }
@media (min-width: 720px) { .overlay-fields { grid-template-columns: 1fr 1fr; gap: 16px; } }
.overlay-field {
  background: #fffdf6; border: 1px solid var(--rule); border-radius: 10px;
  padding: 18px 20px;
}
.overlay-field h3 { font-size: 1rem; margin-bottom: 6px; }
.overlay-field p { font-size: 0.92rem; max-width: none; }

.contacts-when {
  margin-top: 32px; padding: 22px 24px;
  background: var(--paper-warm); border-left: 3px solid var(--sage-deep); border-radius: 4px;
}
.contacts-when .label {
  font-family: var(--font-retro); font-size: 0.62rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--sage-deep); margin-bottom: 8px;
}
.contacts-when p { font-size: 0.94rem; max-width: 64ch; }
.contacts-when p + p { margin-top: 8px; }
.contacts-when code { font-family: var(--font-mono); font-size: 0.85em; background: var(--paper); padding: 1px 6px; border-radius: 3px; }

.activity-section { background: var(--paper-warm); }
.activity-section .lede { font-size: 1.05rem; color: var(--ink); max-width: 64ch; margin-top: 14px; }
.activity-section .lede strong { color: var(--ink); font-weight: 700; }
.activity-meta-grid { display: grid; gap: 18px; margin-top: 28px; grid-template-columns: 1fr; }
@media (min-width: 720px) { .activity-meta-grid { grid-template-columns: 1fr 1fr; gap: 20px; } }
.activity-card { background: #fffdf6; border: 2px solid var(--ink); border-radius: 12px; padding: 22px 20px; box-shadow: 3px 3px 0 var(--ink); }
.activity-card h3 { font-size: 1.02rem; margin-bottom: 6px; }
.activity-card p { font-size: 0.93rem; max-width: none; }
.activity-card code { font-family: var(--font-mono); font-size: 0.85em; background: var(--paper-deep); padding: 1px 5px; border-radius: 3px; }
footer { padding: 28px 0; border-top: 1px solid var(--rule); font-family: var(--font-retro); font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }
footer .inner { max-width: 920px; margin: 0 auto; padding: 0 24px; display: flex; flex-wrap: wrap; gap: 18px; justify-content: space-between; }
</style>
</head>
<body>

<section class=&quot;hero&quot;>
  <div class=&quot;wrap&quot;>
    <span class=&quot;stamp&quot;>Workflow</span>
    <h1>How the publishing pipeline <span class=&quot;ink-accent&quot;>actually works.</span></h1>
    <p class=&quot;sub&quot;>Content goes in as tagged markdown files. Cuts shape it through lenses. Frames come out as self-contained HTML. Windows bundle frames into tabbed packages.</p>
  </div>
</section>

<section>
  <div class=&quot;wrap&quot;>
    <div class=&quot;kicker&quot;>Core concepts</div>
    <h2>Five pieces, one pipeline.</h2>
    <div class=&quot;concept-grid&quot;>
      <div class=&quot;concept-card&quot;>
        <span class=&quot;badge&quot;>Input</span>
        <h3>Content</h3>
        <p>Your markdown files. Tagged with a content-tag in their visibility array to mark them as source material for a specific cut. No tag, no inclusion.</p>
      </div>
      <div class=&quot;concept-card&quot;>
        <span class=&quot;badge&quot;>Config</span>
        <h3>Cut</h3>
        <p>A config file that defines what goes in (content-tag), who it's for (audience), how it sounds (voice/narrative), and which lens renders it.</p>
      </div>
      <div class=&quot;concept-card&quot;>
        <span class=&quot;badge&quot;>Layout</span>
        <h3>Frame</h3>
        <p>The rendered output. One cut produces one frame: a self-contained HTML file shaped by the lens, styled by the design system. Open it in any browser.</p>
      </div>
      <div class=&quot;concept-card&quot;>
        <span class=&quot;badge&quot;>Bundle</span>
        <h3>Window</h3>
        <p>Multiple frames bundled into a single HTML file with tabbed navigation. One URL, many views. This file you are reading is a window.</p>
      </div>
      <div class=&quot;concept-card&quot;>
        <span class=&quot;badge&quot;>Mood</span>
        <h3>Atmosphere</h3>
        <p>An optional ambient layer beneath the lens content. Particle field, gradient wash, grain texture. Sits at z-index 0; the lens content reads on top of it. Set in the cut config; lenses honor it without changing structure.</p>
      </div>
    </div>
  </div>
</section>

<section class=&quot;contacts-section&quot;>
  <div class=&quot;wrap&quot;>
    <div class=&quot;kicker&quot;>Tuning for an audience</div>
    <h2>Same content, different delivery.</h2>
    <p class=&quot;lede&quot;>When a cut targets a specific person, the rendering tunes to <strong>them</strong>. The system keeps a small profile per contact in <code style=&quot;font-family: var(--font-mono); font-size: 0.85em; background: var(--paper-warm); padding: 1px 6px; border-radius: 3px;&quot;>01_tools/05_contacts/&amp;lt;Name&amp;gt;.md</code>. When that name appears in the cut config's <code style=&quot;font-family: var(--font-mono); font-size: 0.85em; background: var(--paper-warm); padding: 1px 6px; border-radius: 3px;&quot;>audience:</code> field, their preferences get layered on top of the lens defaults. Same project, same lens, two different audiences, two correctly-shaped frames.</p>

    <div class=&quot;overlay-stack&quot; aria-label=&quot;Composition stack&quot;>
      <div class=&quot;overlay-layer l-cut&quot;>
        <span class=&quot;priority&quot;>Priority 01 · highest</span>
        <span class=&quot;label&quot;>Cut config body</span>
        <h3>What this specific cut says.</h3>
        <p>Anything written under Voice, Structure, Emphasis, De-emphasis, or Visual Direction in the cut config wins. Per-cut overrides live here.</p>
      </div>
      <div class=&quot;stack-arrow&quot; aria-hidden=&quot;true&quot;>↓ falls through to ↓</div>
      <div class=&quot;overlay-layer l-contact&quot;>
        <span class=&quot;priority&quot;>Priority 02 · middle</span>
        <span class=&quot;label&quot;>Contact overlay</span>
        <h3>What this person prefers.</h3>
        <p>If the cut config is silent on a section, the agent reads the contact's <code>Rendering Preferences</code> section and applies it. Activated by setting <code>rendering-profile: true</code> in the contact's frontmatter.</p>
      </div>
      <div class=&quot;stack-arrow&quot; aria-hidden=&quot;true&quot;>↓ falls through to ↓</div>
      <div class=&quot;overlay-layer l-lens&quot;>
        <span class=&quot;priority&quot;>Priority 03 · lowest</span>
        <span class=&quot;label&quot;>Lens defaults</span>
        <h3>What the lens spec ships with.</h3>
        <p>If neither the cut config nor the contact provides a section, the lens spec's defaults render. Every cut has a working baseline even with no overrides.</p>
      </div>
    </div>

    <p style=&quot;margin-top: 24px; font-size: 0.94rem; max-width: 64ch;&quot;>Sections resolve <strong>independently</strong>. A cut config can override Voice while leaving Emphasis to the contact overlay and Visual Direction to the lens defaults. Style-source tokens (color, typography) are baked in last and apply regardless of which layer supplied the voice direction.</p>

    <div class=&quot;overlay-detail&quot;>
      <div class=&quot;kicker&quot;>What gets overlaid</div>
      <h2>Four sections inside Rendering Preferences.</h2>
      <div class=&quot;overlay-fields&quot;>
        <div class=&quot;overlay-field&quot;>
          <h3>Visual Language</h3>
          <p>Palette, typography, reference-implementation file, motifs they respond to.</p>
        </div>
        <div class=&quot;overlay-field&quot;>
          <h3>Information Architecture</h3>
          <p>How they scan vs. read. Density. Section ordering. Stats cards, file lists, collapsibles.</p>
        </div>
        <div class=&quot;overlay-field&quot;>
          <h3>What to Emphasize</h3>
          <p>What to lead with. The kind of evidence they actually weigh.</p>
        </div>
        <div class=&quot;overlay-field&quot;>
          <h3>What to De-emphasize</h3>
          <p>What to compact, hide, or move below the fold.</p>
        </div>
      </div>
    </div>

    <div class=&quot;contacts-when&quot;>
      <div class=&quot;label&quot;>When to fill this in</div>
      <p>Copy <code>01_tools/05_contacts/_template.md</code> to <code>&amp;lt;Full Name&amp;gt;.md</code> when you start working with someone. Fill in <strong>Who They Are</strong>, <strong>Shared Work</strong>, and basic notes on <strong>How to Talk to Them</strong> immediately.</p>
      <p>Leave <strong>Rendering Preferences</strong> blank at first. Fill it in only after the pattern is clear. Set <code>rendering-profile: true</code> in frontmatter once it's populated, so the cut-packet skill knows the section is load-bearing. Inventing a person's preferences from a single interaction tends to cost trust.</p>
    </div>
  </div>
</section>

<section class=&quot;ai-prompts-section&quot;>
  <div class=&quot;wrap&quot;>
    <div class=&quot;kicker&quot;>Working with the packet</div>
    <h2>What to ask your AI.</h2>
    <p class=&quot;lede&quot;>The packet is built for <strong>human + AI</strong>. You don't run scripts or copy templates by hand. You tell your AI what you want, and it handles the implementation against the specs in <code>01_tools/</code>. The packet ships <strong>six skills</strong> your AI uses to do the work: three slash commands for session hygiene, plus <code>cut-packet</code>, <code>yaml-audit</code>, and <code>figma-mcp</code>.</p>

    <div class=&quot;subsection-label&quot;>Session rituals · run these as you go</div>
    <div class=&quot;rituals-grid&quot;>
      <div class=&quot;ritual-card&quot;>
        <span class=&quot;cmd&quot;>/scan</span>
        <h3>At session start.</h3>
        <p>Drop anything into <code style=&quot;font-family: var(--font-mono); font-size: 0.85em; background: rgba(245, 216, 142, 0.15); color: var(--butter); padding: 1px 5px; border-radius: 3px;&quot;>00_inbox/</code> as you work (voice memos, screenshots, half-formed ideas). <code style=&quot;font-family: var(--font-mono); font-size: 0.85em; background: rgba(245, 216, 142, 0.15); color: var(--butter); padding: 1px 5px; border-radius: 3px;&quot;>/scan</code> walks the inbox, surfaces pending flags, recent activity, and last session's handoff.</p>
      </div>
      <div class=&quot;ritual-card&quot;>
        <span class=&quot;cmd&quot;>/changelog</span>
        <h3>As you ship.</h3>
        <p>When you finish something meaningful, ask your AI to log it. One line, project-tagged, written to <code style=&quot;font-family: var(--font-mono); font-size: 0.85em; background: rgba(245, 216, 142, 0.15); color: var(--butter); padding: 1px 5px; border-radius: 3px;&quot;>Daily/Changelog.md</code>. Builds an arc you can scan over weeks.</p>
      </div>
      <div class=&quot;ritual-card&quot;>
        <span class=&quot;cmd&quot;>/complete</span>
        <h3>At session end.</h3>
        <p>Hand the next session a baton. One or two sentences naming what's next. The next <code style=&quot;font-family: var(--font-mono); font-size: 0.85em; background: rgba(245, 216, 142, 0.15); color: var(--butter); padding: 1px 5px; border-radius: 3px;&quot;>/scan</code> reads it back.</p>
      </div>
    </div>

    <div class=&quot;subsection-label&quot;>Make a frame · the workhorse</div>
    <div class=&quot;hero-prompt&quot;>
      <h3>The cut-packet prompt.</h3>
      <span class=&quot;prompt-example&quot;>Cut me a frame of [topic or content tag] using the [lens] lens for [audience].</span>
      <p class=&quot;what-happens&quot;>Your AI reads the lens spec, finds the matching content in your folder, applies the contact overlay if you named a specific person, and writes a self-contained HTML frame to <code>03_outbox/</code>.</p>
      <p class=&quot;pitch-note&quot;><strong>Pitch competitions:</strong> the pitch lens has its own routing flow. Say <em>&quot;I'm prepping a pitch for [audience]&quot;</em> and your AI asks four questions (capital type, time budget, audience, stage) before generating an 11-slide deck.</p>
    </div>

    <div class=&quot;subsection-label&quot;>Other useful prompts</div>
    <div class=&quot;prompt-list&quot;>
      <div class=&quot;prompt-item&quot;>
        <h3>Add a contact</h3>
        <span class=&quot;prompt-example&quot;>Add a contact profile for [name].</span>
        <p class=&quot;what-happens&quot;>Your AI copies <code>01_tools/05_contacts/_template.md</code>, fills the basics, leaves Rendering Preferences blank until you know the pattern.</p>
      </div>
      <div class=&quot;prompt-item&quot;>
        <h3>Tune a contact's rendering preferences</h3>
        <span class=&quot;prompt-example&quot;>Update [name]'s profile. They respond well to [pattern].</span>
        <p class=&quot;what-happens&quot;>Your AI fills the Rendering Preferences section and flips <code>rendering-profile: true</code>. Next cut to that audience picks it up automatically.</p>
      </div>
      <div class=&quot;prompt-item&quot;>
        <h3>Audit your folder's frontmatter</h3>
        <span class=&quot;prompt-example&quot;>Run yaml-audit on my folder.</span>
        <p class=&quot;what-happens&quot;>Your AI walks the vault, reports drift (missing required fields, inconsistent casing, typo'd field names), optionally fixes in place. Run before a packet rebuild.</p>
      </div>
      <div class=&quot;prompt-item&quot;>
        <h3>Add a new lens</h3>
        <span class=&quot;prompt-example&quot;>I want a new lens for [use case]. Walk me through it.</span>
        <p class=&quot;what-happens&quot;>Your AI copies the lens template, drafts the spec with you, builds an example, validates against the conventions in <code>01_tools/01_lenses/ADDING-A-LENS.md</code>. Same pattern for atmospheres.</p>
      </div>
      <div class=&quot;prompt-item&quot;>
        <h3>Log a system change</h3>

    <p class=&quot;lede&quot; style=&quot;margin-top: 16px;&quot;>You don't write entries by hand. Tell your AI what changed and why; it writes the entry. Over time the log becomes onboarding context: a new AI instance opens your folder, reads recent activity, and understands why your setup looks the way it does today.</p>

<script>
(function() {
  const desktopTabs = Array.from(document.querySelectorAll('.tab-bar .tab-btn[data-frame]'));
  const mobileBtns = Array.from(document.querySelectorAll('#mobile-sheet button[data-frame]'));
  const frames = Array.from(document.querySelectorAll('.frame-container iframe'));
  const brandLink = document.getElementById('brand-link');
  const cta = document.getElementById('cta-start');
  const ctaMobile = document.getElementById('cta-start-mobile');
  const menuToggle = document.getElementById('menu-toggle');
  const mobileSheet = document.getElementById('mobile-sheet');

  function switchFrame(frameId) {
    frames.forEach(f => f.classList.toggle('active', f.id === frameId));
    desktopTabs.forEach(t => {
      const isActive = t.dataset.frame === frameId;
      t.classList.toggle('active', isActive);
      t.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    mobileBtns.forEach(b => b.classList.toggle('active', b.dataset.frame === frameId));
    closeMobileSheet();
    const f = document.getElementById(frameId);
    if (f && f.contentWindow) { try { f.contentWindow.scrollTo(0, 0); } catch (e) {} }
  }
  function openMobileSheet() { mobileSheet.dataset.open = "true"; menuToggle.setAttribute('aria-expanded', 'true'); }
  function closeMobileSheet() { mobileSheet.dataset.open = "false"; menuToggle.setAttribute('aria-expanded', 'false'); }
  function toggleMobileSheet() { if (mobileSheet.dataset.open === "true") closeMobileSheet(); else openMobileSheet(); }

  desktopTabs.forEach(t => t.addEventListener('click', () => switchFrame(t.dataset.frame)));
  mobileBtns.forEach(b => b.addEventListener('click', () => switchFrame(b.dataset.frame)));
  brandLink.addEventListener('click', (e) => { e.preventDefault(); switchFrame('frame-welcome'); });
  cta.addEventListener('click', (e) => { e.preventDefault(); switchFrame('frame-welcome'); });
  ctaMobile.addEventListener('click', (e) => { e.preventDefault(); switchFrame('frame-welcome'); });
  menuToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleMobileSheet(); });

  document.addEventListener('click', (e) => {
    if (!mobileSheet.contains(e.target) && e.target !== menuToggle && !menuToggle.contains(e.target)) closeMobileSheet();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMobileSheet(); });

  // Allow iframe pages to request a frame switch (e.g. CTAs in the welcome page)
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'switchFrame' && e.data.frameId) {
      switchFrame(e.data.frameId);
    }
  });
})();
</script>
